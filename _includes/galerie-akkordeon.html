<style>
  .galacc details{border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden;background:#fff;}
  .galacc summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:14px 18px;
                  font-family:Arial,sans-serif;font-size:17px;font-weight:700;color:var(--ink);}
  .galacc summary::-webkit-details-marker{display:none;}
  .galacc summary .ic{color:var(--accent);font-size:18px;line-height:1;}
  .galacc summary .count{font-family:Arial,sans-serif;font-size:13px;font-weight:400;color:var(--muted);}
  .galacc summary .chev{margin-left:auto;color:var(--accent);font-size:15px;transition:transform .2s ease;}
  .galacc details[open] summary .chev{transform:rotate(180deg);}
  .galacc .gal{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 14px 16px;}
  .galacc .gal a{display:block;}
  .galacc .gal img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;display:block;
                   background:var(--band);border:1px solid var(--line);}
  @media(max-width:560px){.galacc .gal{grid-template-columns:1fr 1fr;}}
  @media(max-width:380px){.galacc .gal{grid-template-columns:1fr;}}
</style>
<div class="galacc">
